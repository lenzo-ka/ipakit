name: Publish

# Build once, then publish via PyPI Trusted Publishing (OIDC) -- no API tokens.
# Cut a GitHub Release (tag vX.Y.Z) to publish to PyPI. Use the manual
# "Run workflow" button to dry-run a build to TestPyPI first.
#
# One-time setup (see README "Releasing"):
#   - PyPI:    add a Trusted Publisher (project ipakit, this repo, workflow
#              publish.yml, environment "pypi").
#   - TestPyPI: same, environment "testpypi".
#   - GitHub:  create environments "pypi" and "testpypi" (Settings > Environments).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Verify version matches release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION=$(python -c "import ipakit; print(ipakit.__version__)")
          echo "ipakit.__version__=$VERSION release tag=$TAG"
          test "$VERSION" = "${TAG#v}"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ipakit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ipakit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
